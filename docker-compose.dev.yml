# Desenvolvimento: código em volume — alterações no host refletem-se no contentor (HMR).
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build
#
# Variáveis opcionais: DEV_PORT, VITE_API_BASE_URL
#
# O volume `frontend_dev_node_modules` evita sobrescrever dependências nativas do Linux
# com uma pasta `node_modules` do Windows/macOS no host.

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: babaplay-frontend-dev
    volumes:
      # Código-fonte: edições sincronizam em tempo real
      - .:/app
      # node_modules isolados no contentor (Linux); não usar os do host
      - frontend_dev_node_modules:/app/node_modules
    ports:
      - "${DEV_PORT:-8080}:8080"
    environment:
      # URL da API no browser (não use host.docker.internal aqui — o fetch corre no browser)
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
      # Ficheiros em volumes: polling melhora deteção de alterações (WSL/Docker Desktop)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true

volumes:
  frontend_dev_node_modules:
